repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: api-tests
        name: api-tests
        entry: bash -c 'cd apps/api && uv run --extra dev pytest'
        language: system
        pass_filenames: false
